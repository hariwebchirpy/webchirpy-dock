name: Auto-Generate Commit Documentation

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to correctly identify merge commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Documentation Generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: node scripts/generateCommitDocs.js

      - name: Clone Documentation Repository
        env:
          DOCS_REPO: ${{ secrets.DOCS_REPO }}
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${DOCS_REPO_TOKEN}@github.com/${DOCS_REPO}.git docs-repo

      - name: Move Generated Documentation
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          mkdir -p docs-repo/content/projects/${PROJECT_NAME}/changes/
          if [ -d "content/projects/${PROJECT_NAME}/changes/" ]; then
            cp content/projects/${PROJECT_NAME}/changes/*.md docs-repo/content/projects/${PROJECT_NAME}/changes/
          fi

      - name: Commit and Push to Documentation Repository
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          cd docs-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --staged --quiet; then
            echo "No new documentation to commit."
          else
            git commit -m "docs: auto-generate commit documentation for ${GITHUB_REPOSITORY}"
            git push origin main
          fi

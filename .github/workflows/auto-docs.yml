name: Auto Generate Documentation

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    env:
      DOCS_REPO: ${{ secrets.DOCS_REPO }}
      DOCS_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
      PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

    steps:
      # 1. Checkout source repo
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Generate commit docs
      - name: Generate Commit Documentation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
        run: node scripts/generateCommitDocs.js

      # 5. Checkout documentation repository
      - name: Checkout Docs Repo
        if: ${{ env.DOCS_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ env.DOCS_TOKEN }}
          path: docs-repo

      # 6. Copy generated docs
      - name: Copy Generated Docs
        if: ${{ env.DOCS_REPO != '' }}
        run: |
          SOURCE_PROJECT="$(printf '%s' "${PROJECT_NAME:-${GITHUB_REPOSITORY##*/}}" | tr -d '\r' | xargs)"

          echo "Configured project name: $SOURCE_PROJECT"

          copy_project_changes() {
            local project="$1"

            if [ ! -d "content/projects/$project/changes" ]; then
              return 1
            fi

            mkdir -p "docs-repo/content/projects/$project/changes"
            cp -R "content/projects/$project/changes/." \
                  "docs-repo/content/projects/$project/changes/"
            echo "Copied changes for project: $project"
            return 0
          }

          if copy_project_changes "$SOURCE_PROJECT"; then
            exit 0
          fi

          echo "Configured project directory not found. Falling back to copying all available project change folders."

          copied_any=false
          for changes_dir in content/projects/*/changes; do
            [ -d "$changes_dir" ] || continue
            project_name="$(basename "$(dirname "$changes_dir")")"
            copy_project_changes "$project_name" || true
            copied_any=true
          done

          if [ "$copied_any" = false ]; then
            echo "No generated documentation found"
          fi

      # 7. Debug step (helps when something breaks)
      - name: Debug docs repo state
        run: |
          echo "Generated files:"
          ls -R content/projects || true

          echo "Docs repo files:"
          ls -R docs-repo || true

          cd docs-repo
          git status

      # 8. Create Pull Request
      - name: Create Docs PR
        if: ${{ env.DOCS_REPO != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.DOCS_TOKEN }}
          path: docs-repo

          branch: automation/${{ github.event.repository.name }}-commit-docs
          base: main

          commit-message: "docs: auto generate commit docs for ${{ github.repository }}"

          title: "docs: update commit docs for ${{ github.repository }}"

          body: |
            Automated documentation generated from repository commits.

            Source repo: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

name: Auto Generate Documentation

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main
      - master

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    env:
      DOCS_REPO: ${{ secrets.DOCS_REPO }}
      DOCS_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Generate Commit Documentation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
        run: node scripts/generateCommitDocs.js

      - name: Checkout Docs Repo
        if: ${{ env.DOCS_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ env.DOCS_TOKEN }}
          path: docs-repo

      - name: Copy Generated Docs
        if: ${{ env.DOCS_REPO != '' }}
        run: |
          SOURCE_PROJECT="${PROJECT_NAME:-${GITHUB_REPOSITORY##*/}}"

          if [ ! -d "content/projects/${SOURCE_PROJECT}/changes" ]; then
            echo "No docs generated. Skipping."
            exit 0
          fi

          mkdir -p "docs-repo/content/projects/${SOURCE_PROJECT}/changes/"
          cp -R "content/projects/${SOURCE_PROJECT}/changes/." \
                "docs-repo/content/projects/${SOURCE_PROJECT}/changes/"

      - name: Create Docs PR
        if: ${{ env.DOCS_REPO != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.DOCS_TOKEN }}
          path: docs-repo
          branch: automation/${{ github.event.repository.name }}-commit-docs
          base: main

name: Auto Generate Documentation

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    env:
      DOCS_REPO: ${{ secrets.DOCS_REPO }}
      DOCS_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
      PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

    steps:
      # 1. Checkout source repo
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Generate commit docs
      - name: Generate Commit Documentation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
        run: node scripts/generateCommitDocs.js

      # 5. Checkout documentation repository
      - name: Checkout Docs Repo
        if: ${{ env.DOCS_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ env.DOCS_TOKEN }}
          path: docs-repo

      # 6. Copy generated docs
      - name: Copy Generated Docs
        if: ${{ env.DOCS_REPO != '' }}
        run: |
          TARGET_PATH=""
          if [ "$GITHUB_REPOSITORY" = "webchirpy-new/ordering-backend" ]; then TARGET_PATH="brilliant-office/changes/backend";
          elif [ "$GITHUB_REPOSITORY" = "webchirpy-new/ordering-frontend" ]; then TARGET_PATH="brilliant-office/changes/frontend";
          elif [ "$GITHUB_REPOSITORY" = "webchirpy-new/brilliantoffice_mob" ]; then TARGET_PATH="brilliant-office/changes/mobile";
          elif [ "$GITHUB_REPOSITORY" = "webchirpy-new/mytax" ]; then TARGET_PATH="taxsense/changes/backend";
          elif [ "$GITHUB_REPOSITORY" = "webchirpy-new/mytax_web" ]; then TARGET_PATH="taxsense/changes/frontend";
          elif [ "$GITHUB_REPOSITORY" = "webchirpy-new/mytax_app" ]; then TARGET_PATH="taxsense/changes/mobile";
          elif [ "$GITHUB_REPOSITORY" = "hariwebchirpy/webchirpy-dock" ]; then TARGET_PATH="webchirpy-dock/changes/frontend";
          fi

          if [ -z "$TARGET_PATH" ]; then
            TARGET_PATH="${PROJECT_NAME:-${GITHUB_REPOSITORY##*/}}"
          fi

          echo "Target Path: $TARGET_PATH"

          if [ ! -d "content/projects/$TARGET_PATH" ]; then
            echo "No generated documentation found in expected source directory (content/projects/$TARGET_PATH)"
            exit 0
          fi

          mkdir -p "docs-repo/content/projects/$TARGET_PATH"
          cp -R "content/projects/$TARGET_PATH/." "docs-repo/content/projects/$TARGET_PATH/"

      # 7. Debug step (helps when something breaks)
      - name: Debug docs repo state
        run: |
          echo "Generated files:"
          ls -R content/projects || true

          echo "Docs repo files:"
          ls -R docs-repo || true

          cd docs-repo
          git status

      # 8. Create Pull Request
      - name: Create Docs PR
        if: ${{ env.DOCS_REPO != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.DOCS_TOKEN }}
          path: docs-repo

          branch: automation/${{ github.event.repository.name }}-commit-docs
          base: main

          commit-message: "docs: auto generate commit docs for ${{ github.repository }}"

          title: "docs: update commit docs for ${{ github.repository }}"

          body: |
            Automated documentation generated from repository commits.

            Source repo: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

name: Auto Generate Documentation

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Commit Documentation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
        run: node scripts/generateCommitDocs.js

      - name: Checkout Docs Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOCS_REPO }}
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: docs-repo
          ref: main

      - name: Copy Generated Docs
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          mkdir -p docs-repo/content/projects/${PROJECT_NAME}/changes/
          cp -R content/projects/${PROJECT_NAME}/changes/* docs-repo/content/projects/${PROJECT_NAME}/changes/ || true

      - name: Create Docs PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: docs-repo
          commit-message: "docs: auto generate commit docs for ${{ github.repository }}"
          title: "docs: update commit docs for ${{ github.repository }}"
          body: |
            Automated documentation generated from repository commits.

            Source repo: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          branch: automation/${{ github.event.repository.name }}-commit-docs
          base: main

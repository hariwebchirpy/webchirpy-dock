name: Auto Generate Documentation

permissions:
  contents: read

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

  pull_request:
    types:
      - closed
    branches:
      - main
      - master

jobs:
  generate-docs:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Commit Documentation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
        run: node scripts/generateCommitDocs.js

      - name: Checkout Docs Repo
        if: ${{ secrets.DOCS_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOCS_REPO }}
          token: ${{ secrets.DOCS_REPO_TOKEN || github.token }}
          path: docs-repo
          ref: main

      - name: Copy Generated Docs
        if: ${{ secrets.DOCS_REPO != '' }}
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          SOURCE_PROJECT="${PROJECT_NAME:-${GITHUB_REPOSITORY##*/}}"

          if [ ! -d "content/projects/${SOURCE_PROJECT}/changes" ]; then
            echo "No generated docs found at content/projects/${SOURCE_PROJECT}/changes"
            exit 1
          fi

          mkdir -p "docs-repo/content/projects/${SOURCE_PROJECT}/changes/"
          cp -R "content/projects/${SOURCE_PROJECT}/changes/." "docs-repo/content/projects/${SOURCE_PROJECT}/changes/"

      - name: Create Docs PR
        if: ${{ secrets.DOCS_REPO != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DOCS_REPO_TOKEN || github.token }}
          path: docs-repo
          commit-message: "docs: auto generate commit docs for ${{ github.repository }}"
          title: "docs: update commit docs for ${{ github.repository }}"
          body: |
            Automated documentation generated from repository commits.

            Source repo: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          branch: automation/${{ github.event.repository.name }}-commit-docs
          base: main

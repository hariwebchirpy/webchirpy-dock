name: Auto-Generate Commit Documentation

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to correctly identify merge commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Documentation Generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: node scripts/generateCommitDocs.js

      - name: Clone Documentation Repository
        env:
          DOCS_REPO: ${{ secrets.DOCS_REPO }}
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${DOCS_REPO_TOKEN}@github.com/${DOCS_REPO}.git docs-repo

      - name: Move Generated Documentation
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          mkdir -p docs-repo/content/projects/${PROJECT_NAME}/changes/
          if [ -d "content/projects/${PROJECT_NAME}/changes/" ]; then
            cp content/projects/${PROJECT_NAME}/changes/*.md docs-repo/content/projects/${PROJECT_NAME}/changes/
          fi

      - name: Commit Changes to Documentation Branch
        env:
          DOCS_REPO: ${{ secrets.DOCS_REPO }}
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DOCS_BRANCH="auto/docs-${GITHUB_RUN_ID}"
          git checkout -b "${DOCS_BRANCH}"

          git add .
          if git diff --staged --quiet; then
            echo "No new documentation to commit."
          else
            git commit -m "docs: auto-generate commit documentation for ${GITHUB_REPOSITORY}"
            git push --set-upstream origin "${DOCS_BRANCH}"
            echo "DOCS_BRANCH=${DOCS_BRANCH}" >> "$GITHUB_ENV"
          fi

      - name: Open Pull Request in Documentation Repository
        if: env.DOCS_BRANCH != ''
        env:
          DOCS_REPO: ${{ secrets.DOCS_REPO }}
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          PR_TITLE="docs(auto): sync ${GITHUB_REPOSITORY} @ ${GITHUB_SHA}"
          PR_BODY=$(cat <<EOF
          Automated documentation update.

          Source repository: ${GITHUB_REPOSITORY}
          Source commit: ${GITHUB_SHA}
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          gh pr create \
            --repo "${DOCS_REPO}" \
            --base main \
            --head "${DOCS_BRANCH}" \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"
